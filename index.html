<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test de réaction</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#222;
    color:white;
    font-family:Arial;
}

#zone{
    width:400px;
    height:200px;
    background:red;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    cursor:pointer;
    user-select:none;
}

#tour{
    margin-bottom:20px;
    font-size:24px;
}
</style>
</head>

<body>

<h1>Test de réaction</h1>
<div id="tour">Clique test</div>
<div id="zone">CLIQUE ICI</div>

<script>

let count = 0;

const zone = document.getElementById("zone");
const tour = document.getElementById("tour");

zone.addEventListener("click", () => {
count++;
tour.innerHTML = "Clics : " + count;

zone.innerHTML = "OK CLICK ✔";
});

</script>

</body>
</html>
