<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test de réaction</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#222;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

#zone{
    width:450px;
    height:250px;
    background:#d32f2f;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    cursor:pointer;
    border-radius:15px;
    user-select:none;
}

#tour{
    margin-bottom:20px;
    font-size:24px;
}

.jumpscare{
    display:none;
    position:fixed;
    width:200px;
    height:200px;
    object-fit:cover;
    z-index:9999;
    animation: tourner 4s linear infinite;
}

@keyframes tourner{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}
</style>

</head>
<body>

<h1>Test de réaction</h1>

<div id="tour">Tour 1 / 3</div>

<div id="zone">Clique pour commencer</div>

<img id="img1" class="jumpscare" src="R.jpg">
<img id="img2" class="jumpscare" src="moi.png">
<img id="img3" class="jumpscare" src="roi.jpeg">
<img id="img4" class="jumpscare" src="toi.webp">

<audio id="son" src="brainfart-type-beat.mp3"></audio>

<script>

let tour = 1;

const zone = document.getElementById("zone");
const tourTexte = document.getElementById("tour");

const images = [
    document.getElementById("img1"),
    document.getElementById("img2"),
    document.getElementById("img3"),
    document.getElementById("img4")
];

const son = document.getElementById("son");

let intervalDanse = null;

zone.onclick = lancer;

function lancer(){

    zone.onclick = null;

    zone.style.background="#d32f2f";
    zone.innerHTML="Attends...";

    let attente = Math.random()*3000+1500;

    setTimeout(function(){

        zone.style.background="#2e7d32";
        zone.innerHTML="CLIQUE !";

        let debut = Date.now();

        zone.onclick = function(){

            let temps = Date.now()-debut;

            // 🎉 FÊTE AU TOUR 2
            if(tour == 2){

                zone.onclick = null;
                zone.style.pointerEvents = "none";

                images.forEach(img => {
                    img.style.display = "block";
                    img.style.top = "40%"; // 👉 même hauteur
                    img.style.left = Math.random()*80 + "vw";
                });

                son.play();

                // 🎉 DANSE SYNCHRONISÉE
                let direction = 1;
                let yBase = window.innerHeight * 0.4;

                intervalDanse = setInterval(() => {

                    images.forEach((img, i) => {

                        let x = parseFloat(img.style.left);

                        x += direction * (2 + i*0.3);

                        if(x > window.innerWidth - 200 || x < 0){
                            direction *= -1;
                        }

                        img.style.left = x + "px";
                        img.style.top = yBase + Math.sin(Date.now()/200 + i)*30 + "px";

                    });

                }, 16);

                return;
            }

            tour++;

            if(tour > 3){
                tourTexte.innerHTML="Test terminé !";
                zone.innerHTML="Bravo !";
                zone.style.background="#1976d2";
                return;
            }

            tourTexte.innerHTML="Tour "+tour+" / 3";

            zone.style.background="#1976d2";
            zone.innerHTML="Temps : "+temps+" ms<br><br>Clique pour continuer";

            zone.onclick = lancer;
        }

    },attente);
}

</script>

</body>
</html>
