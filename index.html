<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test de réaction</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#222;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

#zone{
    width:450px;
    height:250px;
    background:#d32f2f;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    cursor:pointer;
    border-radius:15px;
    user-select:none;
}

#tour{
    margin-bottom:20px;
    font-size:24px;
}

img{
    display:none;
    position:fixed;
    width:170px;
    height:170px;
    object-fit:cover;
}
</style>
</head>

<body>

<h1>Test de réaction</h1>
<div id="tour">Tour 1 / 3</div>
<div id="zone">Clique pour commencer</div>

<img src="R.jpg" id="i1">
<img src="moi.png" id="i2">
<img src="roi.jpeg" id="i3">
<img src="toi.webp" id="i4">

<audio id="m1" src="brainfart-type-beat.mp3"></audio>
<audio id="m2" src="sandstorm.mp3"></audio>
<audio id="heli" src="helicopter-helicopter.mp3"></audio>

<script>

let tour = 1;
let state = "idle";

const zone = document.getElementById("zone");
const tourTexte = document.getElementById("tour");

const imgs = [i1,i2,i3,i4];

const m1 = document.getElementById("m1");
const m2 = document.getElementById("m2");
const heli = document.getElementById("heli");

let chaos, sandstorm, helicopter;

/* =========================
   🟢 BOUTON TOUJOURS ACTIF
========================= */
zone.addEventListener("click", () => {

if(state !== "idle") return;

state = "waiting";
zone.innerHTML = "Attends...";

setTimeout(()=>{

state = "clickable";
zone.innerHTML = "CLIQUE !";

const start = Date.now();

zone.onclick = () => {

if(state !== "clickable") return;

state = "idle";

tour++;

if(tour > 3){
zone.innerHTML = "FIN DU TEST";
return;
}

tourTexte.innerHTML = "Tour "+tour+" / 3";

/* =========================
   🎵 TOUR 2
========================= */
if(tour == 2){

imgs.forEach(img=>{
img.style.display="block";
img.style.left=Math.random()*window.innerWidth+"px";
img.style.top=Math.random()*window.innerHeight+"px";
});

/* ===== CHAOS ===== */
m1.play();

let t = 0;

chaos = setInterval(()=>{

t += 0.05;

imgs.forEach((img,i)=>{
img.style.left = window.innerWidth/2 + Math.cos(t+i)*160 + "px";
img.style.top = window.innerHeight/2 + Math.sin(t+i)*160 + "px";
});

},16);

/* ===== SANDSTORM ===== */
setTimeout(()=>{

clearInterval(chaos);
m1.pause();
m2.play();

let baseY = window.innerHeight * 0.45;
let step = 0;

sandstorm = setInterval(()=>{

step++;

let wave = Math.sin(step*0.2)*50;
let shake = Math.sin(step*0.6)*5;

imgs.forEach((img,i)=>{

let x = window.innerWidth/2 + (i-1.5)*180 + wave;

img.style.left = x+"px";
img.style.top = baseY + shake+"px";
img.style.transform = "rotate("+Math.sin(step*0.1+i)*8+"deg)";

});

/* ===== HELICOPTER ===== */
if(step > 80){

clearInterval(sandstorm);
m2.pause();
heli.play();

let angle = 0;

helicopter = setInterval(()=>{

angle += 0.6;

imgs.forEach((img,i)=>{

let x = parseFloat(img.style.left) + Math.cos(angle+i)*15;
let y = parseFloat(img.style.top) - 10;

img.style.left = x+"px";
img.style.top = y+"px";
img.style.transform = "rotate("+angle*30+"deg)";

if(y < -200){
img.style.display="none";
}

});

},16);

}

},2500);

return;
}

};

},800);

});

</script>

</body>
</html>
