<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Test de Réaction Ultime</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }

        #game-zone {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.1s ease;
        }

        .waiting { background-color: #ce2029; } 
        .click-now { background-color: #228b22; } 
        .neutral { background-color: #121212; }

        #instruction {
            font-size: 1.8rem;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            padding: 0 20px;
            box-sizing: border-box;
        }

        /* --- Zone des images --- */
        #party-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .party-img {
            position: absolute;
            width: 20vw; 
            height: 20vw;
            max-width: 110px;
            max-height: 110px;
            min-width: 65px;
            min-height: 65px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* --- Image PPAP Spéciale --- */
        #ppap-guest {
            position: absolute;
            width: 28vw;
            height: 28vw;
            max-width: 150px;
            max-height: 150px;
            object-fit: cover;
            border-radius: 15px;
            bottom: -200px; 
            left: 50%;
            transform: translateX(-50%);
            display: none;
            box-shadow: 0 0 25px #ffcc00;
            z-index: 10;
        }

        /* Animation de marche PPAP */
        .walking {
            animation: ppap-walk 0.35s infinite alternate ease-in-out;
        }

        @keyframes ppap-walk {
            0% { transform: translateX(-50%) rotate(-10deg) scale(0.95); }
            100% { transform: translateX(-50%) rotate(10deg) scale(1.05); }
        }

        /* --- DANSE SANDSTORM ULTRA MOUVEMENTÉE --- */
        .dance {
            animation: ultra-dance 0.25s infinite alternate ease-in-out, rainbow-glow 0.4s infinite alternate;
        }

        @keyframes ultra-dance {
            0% { 
                transform: translateY(0) scale(0.85) rotate(-20deg); 
            }
            50% {
                transform: scale(1.25) rotate(0deg);
            }
            100% { 
                transform: translateY(-45px) scale(0.85) rotate(20deg); 
            }
        }

        @keyframes rainbow-glow {
            0% { box-shadow: 0 0 25px #ff0000; filter: hue-rotate(0deg); }
            50% { box-shadow: 0 0 40px #00ff00; }
            100% { box-shadow: 0 0 25px #0000ff; filter: hue-rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="game-zone" class="neutral">
        <div id="instruction">TOUCHER L'ÉCRAN POUR LANCER LE TEST</div>
    </div>

    <div id="party-container">
        <img src="R.jpg" class="party-img" id="img1" alt="R">
        <img src="moi.png" class="party-img" id="img2" alt="moi">
        <img src="roi.jpeg" class="party-img" id="img3" alt="roi">
        <img src="toi.webp" class="party-img" id="img4" alt="toi">
        <img src="ppap.png" id="ppap-guest" alt="PPAP">
    </div>

    <audio id="snd-click" src="click.mp3" preload="auto"></audio>
    <audio id="snd-brainfart" src="brainfart-type-beat.mp3" loop preload="auto"></audio>
    <audio id="snd-ppap" src="ppap.mp3" preload="auto"></audio>
    <audio id="snd-sandstorm" src="sandstorm.mp3" loop preload="auto"></audio>
    <audio id="snd-helicopter" src="helicopter-helicopter.mp3" loop preload="auto"></audio>

    <script>
        const gameZone = document.getElementById('game-zone');
        const instruction = document.getElementById('instruction');
        const partyContainer = document.getElementById('party-container');
        const images = document.querySelectorAll('.party-img');
        const ppapGuest = document.getElementById('ppap-guest');

        const sndClick = document.getElementById('snd-click');
        const sndBrainfart = document.getElementById('snd-brainfart');
        const sndPpap = document.getElementById('snd-ppap');
        const sndSandstorm = document.getElementById('snd-sandstorm');
        const sndHelicopter = document.getElementById('snd-helicopter');

        let tour = 1;
        let state = "START"; 
        let startTime, timerTimeout;

        let positions = [];
        let chaosInterval;

        gameZone.addEventListener('click', () => {
            // Le son de clic se lance UNIQUEMENT si on est dans le jeu normal (pas pendant la fête)
            if (state !== "PARTY") {
                sndClick.currentTime = 0;
                sndClick.play().catch(() => {});
            }

            if (state === "START") {
                sndBrainfart.play().then(() => sndBrainfart.pause());
                sndPpap.play().then(() => sndPpap.pause());
                sndSandstorm.play().then(() => sndSandstorm.pause());
                sndHelicopter.play().then(() => sndHelicopter.pause());
                
                state = "BREAK";
                startRound();
                return;
            }

            if (state === "BREAK") {
                if (tour <= 3) startRound();
            } else if (state === "WAITING") {
                clearTimeout(timerTimeout);
                gameZone.className = "neutral";
                instruction.innerHTML = "Trop tôt ! Touchez pour réessayer ce tour.";
                state = "BREAK";
            } else if (state === "CLICKABLE") {
                let reactionTime = Date.now() - startTime;
                gameZone.className = "neutral";
                
                if (tour === 2) {
                    state = "PARTY"; // Désactive les futurs bruits de clic.mp3
                    instruction.style.opacity = "0"; 
                    triggerChaos();
                } else {
                    if (tour === 1) {
                        instruction.innerHTML = `Temps de réaction : ${reactionTime}ms.<br>Touchez pour le tour suivant.`;
                        tour++;
                        state = "BREAK";
                    } else if (tour === 3) {
                        instruction.innerHTML = `Test fini ! Score final : ${reactionTime}ms.<br>Merci d'avoir joué !`;
                        tour++;
                        state = "END";
                    }
                }
            }
        });

        function startRound() {
            instruction.style.opacity = "1";
            instruction.innerHTML = `Tour ${tour} : Attendez le VERT...`;
            gameZone.className = "waiting";
            state = "WAITING";

            let randomDelay = Math.random() * 2000 + 1500;
            timerTimeout = setTimeout(() => {
                gameZone.className = "click-now";
                instruction.innerHTML = "TOUCHEZ MAINTENANT !";
                startTime = Date.now();
                state = "CLICKABLE";
            }, randomDelay);
        }

        function triggerChaos() {
            partyContainer.style.display = 'block';
            ppapGuest.style.display = 'none';
            ppapGuest.className = '';
            const imgSize = images[0].offsetWidth;

            images.forEach((img, index) => {
                positions[index] = {
                    x: Math.random() * (window.innerWidth - imgSize),
                    y: Math.random() * (window.innerHeight - imgSize),
                    dx: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 5 + 5), 
                    dy: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 5 + 5),
                    angle: Math.random() * 360,
                    scale: 1,
                    scaleDirection: 1
                };
            });

            sndBrainfart.play();
            
            // 1. Phase Brainfart (12 secondes)
            chaosInterval = setInterval(() => {
                const currentImgSize = images[0].offsetWidth;
                images.forEach((img, index) => {
                    let pos = positions[index];
                    pos.x += pos.dx;
                    pos.y += pos.dy;
                    pos.angle += 5; 

                    pos.scale += 0.06 * pos.scaleDirection;
                    if (pos.scale >= 1.4 || pos.scale <= 0.7) pos.scaleDirection *= -1;

                    if (pos.x <= 0 || pos.x >= window.innerWidth - currentImgSize) pos.dx *= -1;
                    if (pos.y <= 0 || pos.y >= window.innerHeight - currentImgSize) pos.dy *= -1;

                    img.style.left = pos.x + 'px';
                    img.style.top = pos.y + 'px';
                    img.style.transform = `rotate(${pos.angle}deg) scale(${pos.scale})`;
                });
            }, 16);

            // 1.5 Entrée de ppap.png (À 12 secondes)
            setTimeout(() => {
                clearInterval(chaosInterval);
                sndBrainfart.pause();
                
                images.forEach(img => { img.style.transform = "scale(1)"; });

                sndPpap.play();
                ppapGuest.style.display = 'block';
                ppapGuest.classList.add('walking');
                ppapGuest.style.transition = "bottom 3.5s ease-out";
                
                setTimeout(() => {
                    const guestSize = ppapGuest.offsetWidth;
                    ppapGuest.style.bottom = (window.innerHeight / 2 - guestSize / 2) + 'px';
                }, 50);

            }, 12000);

            // 2. Sandstorm et Danse (À 16 secondes)
            setTimeout(() => {
                ppapGuest.classList.remove('walking');
                sndPpap.pause();
                sndSandstorm.play();
                
                const currentImgSize = images[0].offsetWidth;
                const guestSize = ppapGuest.offsetWidth;
                const isPortrait = window.innerHeight > window.innerWidth;

                images.forEach((img, index) => {
                    img.style.transition = "all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
                    
                    if (isPortrait) {
                        let spacing = window.innerHeight / 6;
                        let targetY = spacing * (index + 1) - (currentImgSize / 2);
                        img.style.left = (window.innerWidth / 2 - (currentImgSize / 2)) + 'px';
                        img.style.top = targetY + 'px';
                    } else {
                        let spacing = window.innerWidth / 6;
                        let targetX = spacing * (index + 1) - (currentImgSize / 2);
                        img.style.left = targetX + 'px';
                        img.style.top = (window.innerHeight / 2 - (currentImgSize / 2)) + 'px';
                    }
                    
                    setTimeout(() => {
                        img.classList.add('dance');
                    }, 800);
                });

                ppapGuest.style.transition = "all 0.8s ease-in-out";
                ppapGuest.style.left = "50%";
                if (isPortrait) {
                    ppapGuest.style.bottom = "auto";
                    ppapGuest.style.top = (window.innerHeight / 6 * 5 - guestSize / 2) + 'px';
                } else {
                    ppapGuest.style.bottom = "auto";
                    ppapGuest.style.left = (window.innerWidth / 6 * 5 - guestSize / 2) + 'px';
                    ppapGuest.style.top = (window.innerHeight / 2 - guestSize / 2) + 'px';
                }
                
                setTimeout(() => {
                    ppapGuest.classList.add('dance');
                    ppapGuest.style.transform = "none"; 
                }, 800);

            }, 16000);

            // 3. Hélicoptère (À 30 secondes)
            setTimeout(() => {
                images.forEach(img => {
                    img.classList.remove('dance');
                    img.style.transition = "none";
                });
                ppapGuest.classList.remove('dance');
                ppapGuest.style.transition = "none";
                
                sndSandstorm.pause();
                sndHelicopter.play();

                let angleHelico = 0;
                let altitude = parseFloat(images[0].style.top) || (window.innerHeight / 2);
                let guestAltitude = parseFloat(ppapGuest.style.top) || (window.innerHeight / 2);
                let speed = 0;

                let heliInterval = setInterval(() => {
                    angleHelico += 45; 
                    speed += 0.5;
                    altitude -= speed;
                    guestAltitude -= speed;

                    images.forEach((img) => {
                        img.style.transform = `rotate(${angleHelico}deg)`;
                        img.style.top = altitude + 'px';
                    });
                    
                    ppapGuest.style.transform = `rotate(${angleHelico}deg)`;
                    ppapGuest.style.top = guestAltitude + 'px';

                    if (altitude < -200 && guestAltitude < -200) {
                        clearInterval(heliInterval);
                        partyContainer.style.display = 'none';
                        ppapGuest.style.display = 'none';
                        sndHelicopter.pause();
                        
                        tour = 3;
                        startRound(); 
                    }
                }, 16);

            }, 30000); 
        }
    </script>
</body>
</html>
