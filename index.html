<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test de réaction</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#222;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

#zone{
    width:450px;
    height:250px;
    background:#d32f2f;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    cursor:pointer;
    border-radius:15px;
    user-select:none;
}

#tour{
    margin-bottom:20px;
    font-size:24px;
}

.jumpscare{
    display:none;
    position:fixed;
    width:250px;
    height:250px;
    object-fit:cover;
    z-index:9999;
    animation: tourner 4s linear infinite;
}

@keyframes tourner{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
</style>
</head>
<body>

<h1>Test de réaction</h1>

<div id="tour">Tour 1 / 5</div>

<div id="zone">
Clique pour commencer
</div>

<img id="img1" class="jumpscare" src="R.jpg">
<img id="img2" class="jumpscare" src="toi.png">
<img id="img3" class="jumpscare" src="roi.wepb">
<img id="img4" class="jumpscare" src="moi.png">

<audio id="son" src="brainfart-type-beat.mp3"></audio>

<script>

let tour = 1;

const zone = document.getElementById("zone");
const tourTexte = document.getElementById("tour");

const images = [
    document.getElementById("img1"),
    document.getElementById("img2"),
    document.getElementById("img3"),
    document.getElementById("img4")
];

const son = document.getElementById("son");

zone.onclick = lancer;

function lancer(){

    zone.onclick = null;

    zone.style.background = "#d32f2f";
    zone.innerHTML = "Attends...";

    let attente = Math.random()*3000+1500;

    setTimeout(function(){

        zone.style.background="#2e7d32";
        zone.innerHTML="CLIQUE !";

        let debut = Date.now();

        zone.onclick = function(){

            let temps = Date.now()-debut;

            if(tour == 4){

                images.forEach(img => img.style.display = "block");

                son.play();

                const objets = images.map(() => ({
                    x: Math.random()*(window.innerWidth-250),
                    y: Math.random()*(window.innerHeight-250),
                    dx: (Math.random()*4+2)*(Math.random()<0.5?-1:1),
                    dy: (Math.random()*4+2)*(Math.random()<0.5?-1:1)
                }));

                setInterval(function(){

                    objets.forEach(function(o,i){

                        o.x += o.dx;
                        o.y += o.dy;

                        if(o.x <= 0 || o.x >= window.innerWidth-250) o.dx *= -1;
                        if(o.y <= 0 || o.y >= window.innerHeight-250) o.dy *= -1;

                        images[i].style.left = o.x + "px";
                        images[i].style.top = o.y + "px";

                    });

                },16);

                return;
            }

            tour++;

            if(tour > 5){
                tourTexte.innerHTML = "Test terminé !";
                zone.innerHTML = "Bravo !";
                zone.style.background = "#1976d2";
                return;
            }

            tourTexte.innerHTML = "Tour " + tour + " / 5";

            zone.style.background = "#1976d2";
            zone.innerHTML = "Temps : " + temps + " ms<br><br>Clique pour continuer";

            zone.onclick = lancer;

        }

    },attente);

}

</script>

</body>
</html>
