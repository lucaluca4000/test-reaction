<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test de réaction</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#222;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

#zone{
    width:450px;
    height:250px;
    background:#d32f2f;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    cursor:pointer;
    border-radius:15px;
    user-select:none;
}

#tour{
    margin-bottom:20px;
    font-size:24px;
}

.jumpscare{
    display:none;
    position:fixed;
    width:300px;
    height:300px;
    object-fit:cover;
    z-index:9999;
    animation: tourner 4s linear infinite;
}

@keyframes tourner{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}
</style>

</head>
<body>

<h1>Test de réaction</h1>

<div id="tour">Tour 1 / 5</div>

<div id="zone">
Clique pour commencer
</div>

<img id="img1" class="jumpscare" src="R.jpg">
<img id="img2" class="jumpscare" src="toi.png">

<audio id="son" src="brainfart-type-beat.mp3"></audio>

<script>

let tour = 1;

const zone = document.getElementById("zone");
const tourTexte = document.getElementById("tour");

const img1 = document.getElementById("img1");
const img2 = document.getElementById("img2");

const son = document.getElementById("son");

zone.onclick = lancer;

function lancer(){

    zone.onclick = null;

    zone.style.background="#d32f2f";
    zone.innerHTML="Attends...";

    let attente=Math.random()*3000+1500;

    setTimeout(function(){

        zone.style.background="#2e7d32";
        zone.innerHTML="CLIQUE !";

        let debut=Date.now();

        zone.onclick=function(){

            let temps=Date.now()-debut;

            if(tour==4){

                img1.style.display="block";
                img2.style.display="block";

                son.play();

                let x1=50;
                let y1=50;
                let dx1=3;
                let dy1=2;

                let x2=window.innerWidth-350;
                let y2=window.innerHeight-350;
                let dx2=-2;
                let dy2=3;

                setInterval(function(){

                    x1+=dx1;
                    y1+=dy1;

                    if(x1<0 || x1>window.innerWidth-300) dx1=-dx1;
                    if(y1<0 || y1>window.innerHeight-300) dy1=-dy1;

                    img1.style.left=x1+"px";
                    img1.style.top=y1+"px";

                    x2+=dx2;
                    y2+=dy2;

                    if(x2<0 || x2>window.innerWidth-300) dx2=-dx2;
                    if(y2<0 || y2>window.innerHeight-300) dy2=-dy2;

                    img2.style.left=x2+"px";
                    img2.style.top=y2+"px";

                },16);

                return;
            }

            tour++;

            if(tour>5){
                tourTexte.innerHTML="Test terminé !";
                zone.innerHTML="Bravo !";
                zone.style.background="#1976d2";
                return;
            }

            tourTexte.innerHTML="Tour "+tour+" / 5";

            zone.style.background="#1976d2";
            zone.innerHTML="Temps : "+temps+" ms<br><br>Clique pour continuer";

            zone.onclick=lancer;

        }

    },attente);

}

</script>

</body>
</html>
