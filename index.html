<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test de réaction</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#222;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
}

#zone{
    width:450px;
    height:250px;
    background:#d32f2f;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    cursor:pointer;
    border-radius:15px;
    user-select:none;
}

#tour{
    margin-bottom:20px;
    font-size:24px;
}

#jumpscare{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:9999;
}
</style>

</head>
<body>

<h1>Test de réaction</h1>

<div id="tour">Tour 1 / 5</div>

<div id="zone">
Clique pour commencer
</div>

<img id="jumpscare" src="R.jpg">

<audio id="son" src="brainfart-type-beat.mp3"></audio>

<script>

let tour = 1;

const zone = document.getElementById("zone");
const tourTexte = document.getElementById("tour");
const image = document.getElementById("jumpscare");
const son = document.getElementById("son");

zone.onclick = lancer;

function lancer(){

    zone.onclick = null;

    zone.style.background = "#d32f2f";
    zone.innerHTML = "Attends...";

    let attente = Math.random()*3000+1500;

    setTimeout(function(){

        zone.style.background = "#2e7d32";
        zone.innerHTML = "CLIQUE !";

        let debut = Date.now();

        zone.onclick = function(){

            let temps = Date.now()-debut;

            if(tour == 4){

                image.style.display = "block";
                son.play();

                return;
            }

            tour++;

            if(tour>5){
                tourTexte.innerHTML="Test terminé !";
                zone.innerHTML="Bravo !";
                zone.style.background="#1976d2";
                return;
            }

            tourTexte.innerHTML="Tour "+tour+" / 5";

            zone.style.background="#1976d2";
            zone.innerHTML="Temps : "+temps+" ms<br><br>Clique pour continuer";

            zone.onclick=lancer;

        }

    },attente);

}

</script>

</body>
</html>
