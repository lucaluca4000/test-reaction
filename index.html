<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Show musical</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#222;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

#zone{
    width:450px;
    height:250px;
    background:#d32f2f;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    cursor:pointer;
    border-radius:15px;
}

#tour{
    margin-bottom:20px;
    font-size:24px;
}

img{
    display:none;
    position:fixed;
    width:170px;
    height:170px;
    object-fit:cover;
}
</style>
</head>

<body>

<h1>Show musical</h1>
<div id="tour">Tour 1 / 3</div>
<div id="zone">Clique pour commencer</div>

<img src="R.jpg" id="i1">
<img src="moi.png" id="i2">
<img src="roi.jpeg" id="i3">
<img src="toi.webp" id="i4">

<audio id="m1" src="brainfart-type-beat.mp3"></audio>
<audio id="m2" src="sandstorm.mp3"></audio>
<audio id="heli" src="helicopter-helicopter.mp3"></audio>

<script>

let tour = 1;

const zone = document.getElementById("zone");
const tourTexte = document.getElementById("tour");

const imgs = [
i1,i2,i3,i4
];

const m1 = document.getElementById("m1");
const m2 = document.getElementById("m2");
const heli = document.getElementById("heli");

let chaos, dance, helicopter;

zone.onclick = start;

function start(){

zone.onclick = null;
zone.innerHTML = "Attends...";

setTimeout(()=>{

zone.innerHTML = "CLIQUE !";

let debut = Date.now();

zone.onclick = function(){

let t = Date.now() - debut;

tour++;

if(tour > 3){
zone.innerHTML = "FIN";
return;
}

tourTexte.innerHTML = "Tour "+tour+" / 3";

if(tour == 2){

zone.style.pointerEvents="none";

/* ================= CHAOS + MUSIC 1 ================= */

imgs.forEach(i=>{
i.style.display="block";
i.style.left=Math.random()*window.innerWidth+"px";
i.style.top=Math.random()*window.innerHeight+"px";
});

m1.play();

let t1 = 0;

chaos = setInterval(()=>{

t1 += 0.05;

imgs.forEach((img,i)=>{
img.style.left = window.innerWidth/2 + Math.cos(t1+i)*150 + "px";
img.style.top = window.innerHeight/2 + Math.sin(t1+i)*150 + "px";
});

},16);

/* ================= SANDSTORM ================= */

setTimeout(()=>{

clearInterval(chaos);
m1.pause();
m2.play();

let baseY = window.innerHeight*0.4;

imgs.forEach((img,i)=>{
img.style.left = (window.innerWidth/2 - 250 + i*170)+"px";
img.style.top = baseY+"px";
});

let step = 0;

dance = setInterval(()=>{

step++;

let move = Math.sin(step/8)*6;
let pulse = Math.sin(step/4)*10;

imgs.forEach(img=>{
let x = parseFloat(img.style.left);
img.style.left = (x + move)+"px";
img.style.top = (baseY + pulse)+"px";
img.style.transform = "rotate("+(Math.sin(step/6)*5)+"deg)";
});

/* ================= 🚁 HELICOPTER (remplace vortex) ================= */

if(step > 60){

clearInterval(dance);
m2.pause();
heli.play();

let angle = 0;

helicopter = setInterval(()=>{

angle += 0.4; // 🔥 rotation rapide

imgs.forEach((img,i)=>{

let x = parseFloat(img.style.left) + Math.cos(angle)*20;
let y = parseFloat(img.style.top) - 12;

img.style.left = x+"px";
img.style.top = y+"px";
img.style.transform = "rotate("+angle*20+"deg)";

if(y < -200){
img.style.display="none";
}

});

},16);

}

},5000);

return;
}

zone.onclick = start;

};

},1000);

}

</script>

</body>
</html>
