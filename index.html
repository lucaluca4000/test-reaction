<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test de réaction</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    background:#222;
    color:white;
    font-family:Arial;
}

#zone{
    width:420px;
    height:220px;
    background:red;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    cursor:pointer;
    user-select:none;
}
</style>
</head>

<body>

<h1>Test de réaction</h1>
<div id="zone">CLIQUE ICI</div>

<script>

const zone = document.getElementById("zone");

let step = 0;

/* =========================
   BOUTON ULTRA SIMPLE
========================= */
zone.addEventListener("click", function(){

step++;

console.log("CLICK OK - step =", step);

if(step === 1){
zone.innerHTML = "OK 1 ✔";
zone.style.background = "green";
}

else if(step === 2){
zone.innerHTML = "OK 2 ✔";
zone.style.background = "blue";
}

else if(step === 3){
zone.innerHTML = "FIN ✔";
zone.style.background = "purple";
}

});

</script>

</body>
</html>
