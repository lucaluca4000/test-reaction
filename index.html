<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test de réaction ULTRA</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#222;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    overflow:hidden;
}

#zone{
    width:450px;
    height:250px;
    background:#d32f2f;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:30px;
    cursor:pointer;
    border-radius:15px;
}

#tour{
    margin-bottom:20px;
    font-size:24px;
}

.jumpscare{
    display:none;
    position:fixed;
    width:180px;
    height:180px;
    object-fit:cover;
    z-index:9999;
}
</style>
</head>

<body>

<h1>Test de réaction</h1>
<div id="tour">Tour 1 / 3</div>
<div id="zone">Clique pour commencer</div>

<img id="img1" class="jumpscare" src="R.jpg">
<img id="img2" class="jumpscare" src="moi.png">
<img id="img3" class="jumpscare" src="roi.jpeg">
<img id="img4" class="jumpscare" src="toi.webp">

<audio id="music" src="brainfart-type-beat.mp3"></audio>
<audio id="helicopter" src="helicopter-helicopter.mp3"></audio>

<script>

let tour = 1;

const zone = document.getElementById("zone");
const tourTexte = document.getElementById("tour");

const images = [
img1,img2,img3,img4
];

const music = document.getElementById("music");
const helicopter = document.getElementById("helicopter");

let chaosInterval;
let danceInterval;
let flyInterval;

zone.onclick = lancer;

function lancer(){

zone.onclick = null;

zone.style.background="#d32f2f";
zone.innerHTML="Attends...";

let attente = Math.random()*2000+1000;

setTimeout(()=>{

zone.style.background="#2e7d32";
zone.innerHTML="CLIQUE !";

let debut = Date.now();

zone.onclick = function(){

let temps = Date.now() - debut;

/* ================= TOUR 2 ================= */
if(tour == 2){

zone.onclick = null;
zone.style.pointerEvents = "none";

images.forEach(img=>{
img.style.display="block";
img.style.left=Math.random()*window.innerWidth+"px";
img.style.top=Math.random()*window.innerHeight+"px";
});

music.play();

/* ===== CHAOS ===== */
let t = 0;

chaosInterval = setInterval(()=>{

t += 0.05;

images.forEach((img,i)=>{

let x = window.innerWidth/2 + Math.cos(t+i)*120;
let y = window.innerHeight/2 + Math.sin(t+i)*120;

img.style.left = x+"px";
img.style.top = y+"px";

});

},16);

/* ===== ALIGNEMENT + DANCE ===== */
setTimeout(()=>{

clearInterval(chaosInterval);

let baseY = window.innerHeight*0.4;

images.forEach((img,i)=>{
img.style.top = baseY+"px";
img.style.left = (window.innerWidth/2 - 250 + i*170)+"px";
});

/* ===== SANDSTORM DANCE ===== */
let step = 0;

danceInterval = setInterval(()=>{

step++;

let move = Math.sin(step/8)*6;
let pulse = Math.sin(step/4)*10;

images.forEach((img,i)=>{

let x = parseFloat(img.style.left);

img.style.left = (x + move) + "px";
img.style.top = (baseY + pulse) + "px";
img.style.transform = "rotate("+(Math.sin(step/6+i)*5)+"deg)";

});

/* ===== PASSAGE HELICOPTER APRÈS 6s ===== */
if(step > 60){

clearInterval(danceInterval);
helicopter.play();

/* ================= HELICOPTER MODE ================= */
images.forEach((img,i)=>{

let angle = 0;
let speed = 20 + i*5;

img.style.position="fixed";

flyInterval = setInterval(()=>{

angle += speed;

let x = parseFloat(img.style.left) + Math.cos(angle)*10;
let y = parseFloat(img.style.top) - 8; // vol vers le haut

img.style.left = x + "px";
img.style.top = y + "px";

img.style.transform = "rotate("+angle+"deg)";

if(y < -200 || x < -200 || x > window.innerWidth+200){
img.style.display="none";
}

},16);

});

}

},110);

},2000);

return;
}

/* ================= TOUR NORMAL ================= */
tour++;

if(tour > 3){
tourTexte.innerHTML="Test terminé !";
zone.innerHTML="Bravo !";
zone.style.background="#1976d2";
return;
}

tourTexte.innerHTML="Tour "+tour+" / 3";
zone.style.background="#1976d2";
zone.innerHTML="Temps : "+temps+" ms<br><br>Clique pour continuer";
zone.onclick = lancer;

};

},attente);

}

</script>

</body>
</html>
