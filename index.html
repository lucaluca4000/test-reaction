<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Réaction Ultime</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-zone {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.1s ease;
        }

        .waiting { background-color: #ce2029; } /* Rouge attente */
        .click-now { background-color: #228b22; } /* Vert clic */
        .neutral { background-color: #121212; }

        #instruction {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        /* --- Zone des images de la fête --- */
        #party-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .party-img {
            position: absolute;
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s linear;
        }

        /* --- DANSE SANDSTORM ULTRA MOUVEMENTÉE --- */
        .dance {
            animation: ultra-dance 0.3s infinite alternate ease-in-out, rainbow-glow 0.5s infinite alternate;
        }

        @keyframes ultra-dance {
            0% { 
                transform: translateY(0) scale(0.9) rotate(-15deg); 
            }
            50% {
                transform: scale(1.2) rotate(0deg);
            }
            100% { 
                transform: translateY(-60px) scale(0.9) rotate(15deg); 
            }
        }

        @keyframes rainbow-glow {
            0% { box-shadow: 0 0 30px #ff0000; filter: hue-rotate(0deg); }
            50% { box-shadow: 0 0 45px #00ff00; }
            100% { box-shadow: 0 0 30px #0000ff; filter: hue-rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="game-zone" class="neutral">
        <div id="instruction">Cliquez ici pour commencer le test de réaction (3 tours)</div>
    </div>

    <div id="party-container">
        <img src="R.jpg" class="party-img" id="img1" alt="R">
        <img src="moi.png" class="party-img" id="img2" alt="moi">
        <img src="roi.jpeg" class="party-img" id="img3" alt="roi">
        <img src="toi.webp" class="party-img" id="img4" alt="toi">
    </div>

    <!-- Audios -->
    <audio id="snd-brainfart" src="brainfart-type-beat.mp3" loop></audio>
    <audio id="snd-sandstorm" src="sandstorm.mp3" loop></audio>
    <audio id="snd-helicopter" src="helicopter-helicopter.mp3" loop></audio>

    <script>
        const gameZone = document.getElementById('game-zone');
        const instruction = document.getElementById('instruction');
        const partyContainer = document.getElementById('party-container');
        const images = document.querySelectorAll('.party-img');

        // Sons
        const sndBrainfart = document.getElementById('snd-brainfart');
        const sndSandstorm = document.getElementById('snd-sandstorm');
        const sndHelicopter = document.getElementById('snd-helicopter');

        let tour = 1;
        let state = "START"; 
        let startTime, timerTimeout;

        // Variables pour le chaos
        let positions = [];
        let chaosInterval;

        gameZone.addEventListener('click', () => {
            if (state === "START" || state === "BREAK") {
                if (tour <= 3) {
                    startRound();
                }
            } else if (state === "WAITING") {
                clearTimeout(timerTimeout);
                gameZone.className = "neutral";
                instruction.innerHTML = "Trop tôt ! Cliquez pour réessayer ce tour.";
                state = "BREAK";
            } else if (state === "CLICKABLE") {
                let reactionTime = Date.now() - startTime;
                gameZone.className = "neutral";
                
                if (tour === 2) {
                    state = "PARTY";
                    instruction.style.opacity = "0"; // Plus aucun texte visible pendant et après la danse
                    triggerChaos();
                } else {
                    if (tour === 1) {
                        instruction.innerHTML = `Temps de réaction : ${reactionTime}ms.<br>Cliquez pour le tour suivant.`;
                        tour++;
                        state = "BREAK";
                    } else if (tour === 3) {
                        instruction.innerHTML = `Test fini ! Score final : ${reactionTime}ms.<br>Merci d'avoir joué !`;
                        tour++;
                        state = "END";
                    }
                }
            }
        });

        function startRound() {
            instruction.style.opacity = "1";
            instruction.innerHTML = `Tour ${tour} : Attendez le VERT...`;
            gameZone.className = "waiting";
            state = "WAITING";

            let randomDelay = Math.random() * 2000 + 1500;
            timerTimeout = setTimeout(() => {
                gameZone.className = "click-now";
                instruction.innerHTML = "CLIQUEZ MAINTENANT !";
                startTime = Date.now();
                state = "CLICKABLE";
            }, randomDelay);
        }

        function triggerChaos() {
            partyContainer.style.display = 'block';
            
            images.forEach((img, index) => {
                positions[index] = {
                    x: Math.random() * (window.innerWidth - 150),
                    y: Math.random() * (window.innerHeight - 150),
                    dx: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 6 + 6), // Vitesse augmentée (6 à 12px)
                    dy: (Math.random() > 0.5 ? 1 : -1) * (Math.random() * 6 + 6),
                    angle: Math.random() * 360,
                    scale: 1,
                    scaleDirection: 1
                };
            });

            sndBrainfart.play();
            
            // 1. Brainfart ultra dynamique (mouvements rapides + scale vibrant)
            chaosInterval = setInterval(() => {
                images.forEach((img, index) => {
                    let pos = positions[index];
                    pos.x += pos.dx;
                    pos.y += pos.dy;
                    pos.angle += 4; // Rotation plus rapide

                    // Effet de zoom vibrant en continu
                    pos.scale += 0.05 * pos.scaleDirection;
                    if (pos.scale >= 1.4 || pos.scale <= 0.7) pos.scaleDirection *= -1;

                    if (pos.x <= 0 || pos.x >= window.innerWidth - 120) pos.dx *= -1;
                    if (pos.y <= 0 || pos.y >= window.innerHeight - 120) pos.dy *= -1;

                    img.style.left = pos.x + 'px';
                    img.style.top = pos.y + 'px';
                    img.style.transform = `rotate(${pos.angle}deg) scale(${pos.scale})`;
                });
            }, 16);

            // 2. Transition vers Sandstorm (Danse Ultra)
            setTimeout(() => {
                clearInterval(chaosInterval);
                sndBrainfart.pause();
                sndSandstorm.play();
                
                let centerY = window.innerHeight / 2 - 60;
                let spacing = window.innerWidth / 5;

                images.forEach((img, index) => {
                    let targetX = spacing * (index + 1) - 60;
                    img.style.transition = "all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275)";
                    img.style.left = targetX + 'px';
                    img.style.top = centerY + 'px';
                    
                    setTimeout(() => {
                        img.classList.add('dance');
                    }, 600);
                });

            }, 6000);

            // 3. Transition vers Hélicoptère et envol
            setTimeout(() => {
                images.forEach(img => {
                    img.classList.remove('dance');
                    img.style.transition = "none";
                });
                sndSandstorm.pause();
                sndHelicopter.play();

                let angleHelico = 0;
                let altitude = window.innerHeight / 2 - 60;
                let speed = 0;

                let heliInterval = setInterval(() => {
                    angleHelico += 45; // Rotation ultra rapide style hélice
                    speed += 0.5;
                    altitude -= speed;

                    images.forEach((img) => {
                        img.style.transform = `rotate(${angleHelico}deg)`;
                        img.style.top = altitude + 'px';
                    });

                    if (altitude < -200) {
                        clearInterval(heliInterval);
                        partyContainer.style.display = 'none';
                        sndHelicopter.pause();
                        
                        // Enchaînement direct vers le tour 3 sans aucun texte intermédiaire
                        tour = 3;
                        startRound(); 
                    }
                }, 16);

            }, 14000); 
        }
    </script>
</body>
</html>
