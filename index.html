<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Test de Réaction</title>

<style>
body{
    font-family:Arial;
    background:#222;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    height:100vh;
    margin:0;
}

#zone{
    width:400px;
    height:250px;
    background:red;
    display:flex;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    font-size:28px;
    user-select:none;
}

#jumpscare{
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:9999;
}
</style>

</head>
<body>

<h1>Test de Réaction</h1>

<div id="zone">
Clique pour commencer
</div>

<img id="jumpscare" src="R.jpg">

<audio id="son" src="brainfart-type-beat.mp3"></audio>

<script>

const zone=document.getElementById("zone");
const img=document.getElementById("jumpscare");
const son=document.getElementById("son");

let tour=0;
let attente=false;
let depart=0;

zone.onclick=()=>{

    if(attente) return;

    tour++;

    // Au 3e tour : jumpscare
    if(tour===3){

        img.style.display="block";
        son.volume=1;
        son.play();

        return;
    }

    attente=true;
    zone.style.background="red";
    zone.innerHTML="Attends...";

    let delai=Math.random()*3000+1500;

    setTimeout(()=>{

        zone.style.background="green";
        zone.innerHTML="CLIQUE !";
        depart=Date.now();

        attente=false;

        zone.onclick=()=>{
            let temps=Date.now()-depart;

            zone.innerHTML="Ton temps : "+temps+" ms";

            zone.style.background="red";

            zone.onclick=arguments.callee.caller;

            setTimeout(()=>{
                zone.innerHTML="Clique pour le tour suivant";
            },1500);

        };

    },delai);

};

</script>

</body>
</html>
