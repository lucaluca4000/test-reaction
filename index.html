<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test de Réaction Ultime</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        #game-zone {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: background-color 0.1s ease;
        }

        .waiting { background-color: #ce2029; } /* Rouge attente */
        .click-now { background-color: #228b22; } /* Vert clic */
        .neutral { background-color: #121212; }

        #instruction {
            font-size: 2rem;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
        }

        /* --- Zone des images de la fête --- */
        #party-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: none;
        }

        .party-img {
            position: absolute;
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s linear;
        }

        /* --- DANSE SANDSTORM ULTRA MOUVEMENTÉE --- */
        .dance {
            animation: ultra-dance 0.3s infinite alternate ease-in-out, rainbow-glow 0.5s infinite alternate;
        }

        @keyframes ultra-dance {
            0% { 
                transform: translateY(0) scale(0.9) rotate(-15deg); 
            }
            50% {
                transform: scale(1.2) rotate(0deg);
            }
            100% { 
                transform: translateY(-60px) scale(0.9) rotate(15deg); 
            }
        }

        @keyframes rainbow-glow {
            0% { box-shadow: 0 0 30px #ff0000; filter: hue-rotate(0deg); }
